<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c026d3"/>
      <stop offset="35%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Arrow/chevron mark — 3 triangular blades pointing right -->
  <!-- Top blade -->
  <path d="M8 8 L44 8 L56 40 L44 52 L8 44 Z" fill="url(#lg1)" opacity="0.95"/>
  <!-- Bottom blade -->
  <path d="M8 72 L44 72 L56 40 L44 28 L8 36 Z" fill="url(#lg2)" opacity="0.88"/>
  <!-- Right tip / arrow head -->
  <path d="M40 24 L72 24 L80 40 L72 56 L40 56 L52 40 Z" fill="url(#lg1)" opacity="0.92"/>

  <!-- DIGITAL text -->
  <text x="96" y="38" font-family="'Arial Black','Arial',sans-serif" font-weight="900" font-size="26" fill="#1e1b30" letter-spacing="1">DIGITAL</text>
  <!-- SEARCH text -->
  <text x="96" y="62" font-family="'Arial Black','Arial',sans-serif" font-weight="900" font-size="22" fill="#1e1b30" letter-spacing="3">SEARCH</text>
  <!-- GROUP text -->
  <text x="97" y="76" font-family="'Arial',sans-serif" font-weight="400" font-size="11" fill="#6b7280" letter-spacing="5">GROUP</text>
</svg>
